<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mimmy" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="icon" type="image/png" href="/static/icon-192.png" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>Mimmy</title>
</head>
<body>
  <header class="app-header">
    <div class="title">
      <div class="profile-wrap">
        <img src="/static/profile.png" class="profile-img" alt="Mimmy" />
        <span class="status-dot" id="status-dot"></span>
      </div>
      Mimmy
    </div>
    <div class="badges">
      <span class="badge" id="badge-broker">broker</span>
      <span class="badge warn hidden" id="badge-restart">재기동 필요</span>
      <span class="badge danger hidden" id="badge-paused">PAUSED</span>
    </div>
  </header>

  <main id="view-root">
    <!-- views rendered here -->
  </main>

  <nav class="tab-bar">
    <button data-tab="home" class="tab active">
      <span class="ico">●</span><span>홈</span>
    </button>
    <button data-tab="market" class="tab">
      <span class="ico">▤</span><span>시세</span>
    </button>
    <button data-tab="agents" class="tab">
      <span class="ico">✦</span><span>Agents</span>
    </button>
    <button data-tab="chat" class="tab">
      <span class="ico">✎</span><span>챗</span>
    </button>
    <button data-tab="settings" class="tab">
      <span class="ico">⚙</span><span>설정</span>
    </button>
  </nav>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
